---
name: Pull Request
run-name: |
    Pull Request by @${{ github.actor }}

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    security-events: write
    actions: read
    pull-requests: write
    issues: read
    id-token: write

jobs:
    ci:
        uses: arillso/.github/.github/workflows/ci-ansible-collection.yml@2026-06-12
        with:
            collection_namespace: arillso
            collection_name: system
            python_version: "3.12"
            enable_unit_tests: true

    molecule:
        # Scenarios are auto-discovered from extensions/molecule/ by the
        # reusable workflow (every subdir not starting with `.`). To pin
        # the matrix explicitly, pass scenarios: '["access", ...]'.
        uses: arillso/.github/.github/workflows/ci-ansible-molecule.yml@chore/port-workflows-from-sbaerlocher
        with:
            collection_namespace: arillso
            collection_name: system
            python_version: "3.12"

    security-secrets:
        uses: arillso/.github/.github/workflows/security-secrets.yml@2026-06-12

    claude-review:
        uses: arillso/.github/.github/workflows/ai-claude-review.yml@2026-06-12
        secrets:
            CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
