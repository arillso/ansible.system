---
name: Pull Request
run-name: |
    Pull Request by @${{ github.actor }}

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    security-events: write
    actions: read
    pull-requests: write
    issues: read
    id-token: write

jobs:
    ci:
        uses: arillso/.github/.github/workflows/ci-ansible-collection.yml@2026-06-18
        with:
            collection_namespace: arillso
            collection_name: system
            # renovate: datasource=github-releases depName=python/cpython extractVersion=^v(?<version>3\.\d+)
            python_version: "3.12"
            enable_unit_tests: true

    molecule:
        # Scenarios are auto-discovered from extensions/molecule/ by the
        # reusable workflow (every subdir not starting with `.`). To pin
        # the matrix explicitly, pass scenarios: '["access", ...]'.
        #
        # concurrency-suffix avoids a deadlock with the caller's
        # concurrency: group: ${{ github.workflow }}-${{ github.ref }} —
        # the reusable resolves github.workflow to the caller's name
        # ("Pull Request"), so without the suffix both the top-level
        # workflow and the nested molecule call would share the same
        # group and GitHub would cancel the molecule run.
        uses: arillso/.github/.github/workflows/ci-ansible-molecule.yml@2026-06-18
        with:
            collection_namespace: arillso
            collection_name: system
            # renovate: datasource=github-releases depName=python/cpython extractVersion=^v(?<version>3\.\d+)
            python_version: "3.12"
            concurrency-suffix: molecule

    security-secrets:
        uses: arillso/.github/.github/workflows/security-secrets.yml@2026-06-18

    claude-review:
        uses: arillso/.github/.github/workflows/ai-claude-review.yml@2026-06-18
        secrets:
            CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
