---
name: Software Release
run-name: |
    Release ${{ github.ref_name }} by @${{ github.actor }}

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    publish:
        uses: arillso/.github/.github/workflows/release-ansible-collection.yml@2026-06-02
        with:
            collection_namespace: arillso
            collection_name: system
        secrets:
            galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
