---
name: Release - Ansible Collection
run-name: Release ${{ github.ref_name }}

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

concurrency:
    group: release-${{ github.ref_name }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    release:
        uses: arillso/.github/.github/workflows/release-ansible-collection.yml@2026-06-18
        with:
            collection_namespace: arillso
            collection_name: system
        secrets:
            galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
