---
dependency:
    name: galaxy
    options:
        requirements-file: ../.config/requirements.yml

driver:
    name: docker

platforms:
    - name: access-debian-bookworm
      image: geerlingguy/docker-debian12-ansible:latest@sha256:4553092be2c00b1ffe580927b9ff03f3c3a0df32b7dd693a3eb02efb6c2b77b7
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock
      groups:
          - debian

    - name: access-ubuntu-noble
      image: geerlingguy/docker-ubuntu2404-ansible:latest@sha256:eac5576411b04b7e0120990b67f6d687ea2d0174dd1f77d1cd891aedee71c096
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock
      groups:
          - debian

    - name: access-rocky-9
      image: geerlingguy/docker-rockylinux9-ansible:latest@sha256:d1cbc175351a828abed8dac2218bf960c3b2c7a4375f2448894d72dab97994a2
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock
      groups:
          - el

provisioner:
    name: ansible
    env:
        # Point Ansible at the collections checkout the reusable workflow
        # creates under ${GITHUB_WORKSPACE}/ansible_collections/<ns>/<name>/.
        # Without this, include_role on arillso.system.<role> fails because
        # molecule cd's into extensions/ before invoking ansible-playbook,
        # which then doesn't auto-detect the ansible_collections/ marker
        # two levels above. We also append the default user and system
        # locations so the molecule docker driver's collections
        # (community.docker, ansible.posix) stay resolvable.
        ANSIBLE_COLLECTIONS_PATH: ${GITHUB_WORKSPACE}:${HOME}/.ansible/collections:/usr/share/ansible/collections
    config_options:
        defaults:
            interpreter_python: auto_silent
            stdout_callback: default
            result_format: yaml
        ssh_connection:
            pipelining: true
    inventory:
        group_vars:
            all:
                ansible_user: root

verifier:
    name: ansible
