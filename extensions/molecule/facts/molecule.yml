---
dependency:
    name: galaxy
    options:
        requirements-file: ../.config/requirements.yml

driver:
    name: docker

platforms:
    - name: facts-debian-bookworm
      image: geerlingguy/docker-debian12-ansible:latest@sha256:af3173ea26264fc34c5a45bc97142c8530e6fc7c89744bb10143f03b2070f1b3
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

    - name: facts-ubuntu-noble
      image: geerlingguy/docker-ubuntu2404-ansible:latest@sha256:00a7a880e2ee8738d6c0182820795440e5e59c8062778b29861b95b22547e43f
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

    - name: facts-rocky-9
      image: geerlingguy/docker-rockylinux9-ansible:latest@sha256:2be9149edc8fcc59e87ddbbf56cf475b4f5576b18a5f8bd11105d2ef5edb4158
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

provisioner:
    name: ansible
    env:
        # Point Ansible at the collections checkout the reusable workflow
        # creates under ${GITHUB_WORKSPACE}/ansible_collections/<ns>/<name>/.
        # Without this, include_role on arillso.system.<role> fails because
        # molecule cd's into extensions/ before invoking ansible-playbook,
        # which then doesn't auto-detect the ansible_collections/ marker
        # two levels above. We also append the default user and system
        # locations so the molecule docker driver's collections
        # (community.docker, ansible.posix) stay resolvable.
        ANSIBLE_COLLECTIONS_PATH: ${GITHUB_WORKSPACE}:${HOME}/.ansible/collections:/usr/share/ansible/collections
    config_options:
        defaults:
            interpreter_python: auto_silent
            stdout_callback: default
            result_format: yaml
        ssh_connection:
            pipelining: true
    inventory:
        group_vars:
            all:
                ansible_user: root

verifier:
    name: ansible
