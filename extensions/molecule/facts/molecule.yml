---
dependency:
    name: galaxy
    options:
        requirements-file: ../.config/requirements.yml

driver:
    name: docker

platforms:
    - name: facts-debian-bookworm
      # renovate: datasource=docker depName=geerlingguy/docker-debian12-ansible
      image: geerlingguy/docker-debian12-ansible:latest@sha256:1f76107285118095a97e14673de67ee7a4372a840b35223cd0c1212fdd3cf5b3
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

    - name: facts-ubuntu-noble
      # renovate: datasource=docker depName=geerlingguy/docker-ubuntu2404-ansible
      image: geerlingguy/docker-ubuntu2404-ansible:latest@sha256:68af87df907605679a3fd572d0eb8b13330b160a3aa89fe9d89e31a4d8ef6ca0
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

    - name: facts-rocky-9
      # renovate: datasource=docker depName=geerlingguy/docker-rockylinux9-ansible
      image: geerlingguy/docker-rockylinux9-ansible:latest@sha256:967060db9f42dc650fddc74ea175f7aec0b0c852884645a10c95ddaea517eb10
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

provisioner:
    name: ansible
    env:
        # Point Ansible at the collections checkout the reusable workflow
        # creates under ${GITHUB_WORKSPACE}/ansible_collections/<ns>/<name>/.
        # Without this, include_role on arillso.system.<role> fails because
        # molecule cd's into extensions/ before invoking ansible-playbook,
        # which then doesn't auto-detect the ansible_collections/ marker
        # two levels above. We also append the default user and system
        # locations so the molecule docker driver's collections
        # (community.docker, ansible.posix) stay resolvable.
        ANSIBLE_COLLECTIONS_PATH: ${GITHUB_WORKSPACE}:${HOME}/.ansible/collections:/usr/share/ansible/collections
    config_options:
        defaults:
            interpreter_python: auto_silent
            stdout_callback: default
            result_format: yaml
        ssh_connection:
            pipelining: true
    inventory:
        group_vars:
            all:
                ansible_user: root

verifier:
    name: ansible
