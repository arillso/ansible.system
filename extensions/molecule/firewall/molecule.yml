---
# nftables-Tasks brauchen einen funktionierenden netfilter-Stack im Kernel,
# der in Containern nicht zuverlaessig verfuegbar ist. Das Szenario rendert
# die Ruleset-Templates und prueft sie mit `nft -c` in verify.yml — kein
# Kernel-Load, also keine Abhaengigkeit vom Container-Netfilter-Stack.

dependency:
    name: galaxy
    options:
        requirements-file: ../.config/requirements.yml

driver:
    name: docker

platforms:
    - name: firewall-debian-bookworm
      image: geerlingguy/docker-debian12-ansible:latest
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

provisioner:
    name: ansible
    config_options:
        defaults:
            interpreter_python: auto_silent
            stdout_callback: default
            result_format: yaml
        ssh_connection:
            pipelining: true
    inventory:
        group_vars:
            all:
                ansible_user: root

verifier:
    name: ansible

scenario:
    test_sequence:
        - dependency
        - destroy
        - syntax
        - create
        - prepare
        - converge
        - verify
        - destroy
