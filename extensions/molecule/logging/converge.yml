---
- name: Converge — arillso.system.logging
  hosts: all
  become: true

  vars:
      logging_logrotate_enabled: true
      logging_rsyslog_enabled: true
      logging_logrotate_entries:
          - name: molecule-app
            path: /var/log/molecule-app/*.log
            options:
                - daily
                - rotate 7
                - compress
                - missingok
                - notifempty
                - create 0640 root root
      # The role builds the filename as "{{ priority }}-{{ name }}.conf",
      # so name must NOT repeat the priority prefix — otherwise the file
      # lands at 50-50-molecule-app.conf. Resulting file: 50-molecule-app.conf.
      logging_rsyslog_entries:
          - name: molecule-app
            priority: 50
            content: |
                if $programname == 'molecule-app' then /var/log/molecule-app/molecule-app.log
                & stop

  tasks:
      - name: Apply logging role
        ansible.builtin.include_role:
            name: arillso.system.logging
