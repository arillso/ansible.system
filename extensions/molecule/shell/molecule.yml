---
dependency:
    name: galaxy
    options:
        requirements-file: ../.config/requirements.yml

driver:
    name: docker

platforms:
    - name: shell-debian-bookworm
      image: geerlingguy/docker-debian12-ansible:latest@sha256:f580d866a5e830286799b48e9eda2d4b8fc0ef10721096c727e666c7ab4e473e
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

    - name: shell-ubuntu-noble
      image: geerlingguy/docker-ubuntu2404-ansible:latest@sha256:2ac768c4d66b4584c372d533cfc463714cbcd67ad481490a21c1857113ab7e01
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

    - name: shell-rocky-9
      image: geerlingguy/docker-rockylinux9-ansible:latest@sha256:f37406c9ebf8d6ba55e37d007e685a58196efdaffa6cf65a38c39d31d96125fe
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

provisioner:
    name: ansible
    env:
        # Point Ansible at the collections checkout the reusable workflow
        # creates under ${GITHUB_WORKSPACE}/ansible_collections/<ns>/<name>/.
        # Without this, include_role on arillso.system.<role> fails because
        # molecule cd's into extensions/ before invoking ansible-playbook,
        # which then doesn't auto-detect the ansible_collections/ marker
        # two levels above. We also append the default user and system
        # locations so the molecule docker driver's collections
        # (community.docker, ansible.posix) stay resolvable.
        ANSIBLE_COLLECTIONS_PATH: ${GITHUB_WORKSPACE}:${HOME}/.ansible/collections:/usr/share/ansible/collections
    config_options:
        defaults:
            interpreter_python: auto_silent
            stdout_callback: default
            result_format: yaml
        ssh_connection:
            pipelining: true
    inventory:
        group_vars:
            all:
                ansible_user: root

verifier:
    name: ansible
