---
- name: Verify — arillso.system.shell
  hosts: all
  become: true
  gather_facts: false

  tasks:
      - name: Stat MOTD drop-in directory
        ansible.builtin.stat:
            path: /etc/update-motd.d
        register: _motd_dir

      - name: Stat SSH banner file
        ansible.builtin.stat:
            path: /etc/ssh/banner
        register: _banner

      - name: Assert at least one of MOTD or SSH banner was deployed
        ansible.builtin.assert:
            that:
                - _motd_dir.stat.exists or _banner.stat.exists
            success_msg: "shell role deployed at least one of MOTD or SSH banner"
