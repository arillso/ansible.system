---
dependency:
    name: galaxy
    options:
        requirements-file: ../.config/requirements.yml

driver:
    name: docker

platforms:
    - name: systemd-debian-bookworm
      image: geerlingguy/docker-debian12-ansible:latest@sha256:1b1881bfc5f025980765a90e76ecaebd61f53248eb0f3f23bc027da1b201400e
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

    - name: systemd-ubuntu-noble
      image: geerlingguy/docker-ubuntu2404-ansible:latest@sha256:c446997f67e9f43bb427180166ce1db7ad4312f7065242456c57c937cb9cdd5b
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

    - name: systemd-rocky-9
      image: geerlingguy/docker-rockylinux9-ansible:latest@sha256:12e0bf8e95037b84af695b0c4ae6a552e3100c69793ee02f95870b4e02bd22ff
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

provisioner:
    name: ansible
    env:
        # Point Ansible at the collections checkout the reusable workflow
        # creates under ${GITHUB_WORKSPACE}/ansible_collections/<ns>/<name>/.
        # Without this, include_role on arillso.system.<role> fails because
        # molecule cd's into extensions/ before invoking ansible-playbook,
        # which then doesn't auto-detect the ansible_collections/ marker
        # two levels above. We also append the default user and system
        # locations so the molecule docker driver's collections
        # (community.docker, ansible.posix) stay resolvable.
        ANSIBLE_COLLECTIONS_PATH: ${GITHUB_WORKSPACE}:${HOME}/.ansible/collections:/usr/share/ansible/collections
    config_options:
        defaults:
            interpreter_python: auto_silent
            stdout_callback: default
            result_format: yaml
        ssh_connection:
            pipelining: true
    inventory:
        group_vars:
            all:
                ansible_user: root

verifier:
    name: ansible
