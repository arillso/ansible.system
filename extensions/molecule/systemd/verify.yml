---
- name: Verify — arillso.system.systemd
  hosts: all
  become: true
  gather_facts: false

  tasks:
      - name: Stat the molecule-marker unit file
        ansible.builtin.stat:
            path: /etc/systemd/system/molecule-marker.service
        register: _unit

      - name: Assert the unit file was deployed
        ansible.builtin.assert:
            that:
                - _unit.stat.exists
                - _unit.stat.size > 0

      - name: Verify the unit is parseable by systemd
        ansible.builtin.command:
            cmd: systemd-analyze verify /etc/systemd/system/molecule-marker.service
        changed_when: false

      - name: Stat the journald drop-in
        ansible.builtin.stat:
            path: /etc/systemd/journald.conf.d/00-ansible.conf
        register: _journald

      - name: Assert the journald drop-in was rendered
        ansible.builtin.assert:
            that:
                - _journald.stat.exists
                - _journald.stat.size > 0
