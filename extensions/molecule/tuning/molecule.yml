---
# tuning aendert kernel-sysctls, GRUB-cmdline, ethtool, swap, transparent
# hugepages und tuned-Profile. In Containern faellt davon das meiste durch
# (kein eigener Kernel, kein /proc/sys-Write, kein swapon). Dieses Szenario
# faehrt deshalb nur Syntax und Lint statt einem echten Converge.

dependency:
    name: galaxy
    options:
        requirements-file: ../.config/requirements.yml

driver:
    name: docker

platforms:
    - name: tuning-debian-bookworm
      image: geerlingguy/docker-debian12-ansible:latest
      command: /usr/lib/systemd/systemd
      privileged: true
      pre_build_image: true
      cgroupns_mode: host
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      tmpfs:
          - /run
          - /run/lock

provisioner:
    name: ansible
    env:
        # Point Ansible at the collections checkout the reusable workflow
        # creates under ansible_collections/<ns>/<name>/. Without this,
        # include_role on arillso.system.<role> fails to resolve because
        # molecule changes into extensions/ before invoking ansible-
        # playbook, which sits two levels below the ansible_collections/
        # marker dir. MOLECULE_PROJECT_DIRECTORY is
        # extensions/molecule/<scenario>/; five levels up is the workspace
        # root (parent of ansible_collections/).
        ANSIBLE_COLLECTIONS_PATH: ${MOLECULE_PROJECT_DIRECTORY}/../../../../..
    config_options:
        defaults:
            interpreter_python: auto_silent
            stdout_callback: default
            result_format: yaml
        ssh_connection:
            pipelining: true
    inventory:
        group_vars:
            all:
                ansible_user: root

verifier:
    name: ansible

scenario:
    test_sequence:
        - dependency
        - destroy
        - syntax
