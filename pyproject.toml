[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.ansible
  | \.venv
  | venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
extend_skip_glob = [".ansible/*"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [".ansible", ".venv", "venv"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "C90", # mccabe complexity
  "N",   # pep8-naming
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "A",   # flake8-builtins
  "COM", # flake8-commas
  "C4",  # flake8-comprehensions
  "PIE", # flake8-pie
  "PT",  # flake8-pytest-style
  "SIM", # flake8-simplify
]

ignore = [
  "E501",   # line too long (handled by black)
  "COM812", # trailing comma (handled by black)
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.pytest.ini_options]
testpaths = ["tests/unit"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --strict-markers --tb=short --cov-report=term-missing"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
]
