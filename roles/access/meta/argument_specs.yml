---
# Shared option definitions (anchors)

_ssh_key_item_options: &ssh_key_item_options
    user:
        description: "Username"
        type: str
        required: true
    key:
        description: "SSH public key"
        type: str
        required: true
    key_options:
        description: "SSH key options"
        type: str
    state:
        description: "Key state"
        type: str
        default: present
        choices: [present, absent]
    exclusive:
        description: "Remove all other keys"
        type: bool
        default: false

_user_options: &user_options
    access_users:
        description: "List of users to manage"
        type: list
        elements: dict
        default: []
        options:
            name:
                description: "Username"
                type: str
                required: true
            comment:
                description: "User comment (GECOS)"
                type: str
            uid:
                description: "User ID"
                type: int
            group:
                description: "Primary group"
                type: str
            groups:
                description: "List of supplementary groups"
                type: list
                elements: str
            shell:
                description: "User shell"
                type: str
                default: /bin/bash
            home:
                description: "Home directory"
                type: str
            create_home:
                description: "Create home directory"
                type: bool
                default: true
            state:
                description: "User state"
                type: str
                default: present
                choices: [present, absent]
            system:
                description: "System user"
                type: bool
                default: false
            password:
                description: "Encrypted password hash"
                type: str
            update_password:
                description: "When to update password"
                type: str
                default: on_create
                choices: [always, on_create]
            ssh_keys:
                description: "SSH keys for this user"
                type: list
                elements: dict
                options:
                    <<: *ssh_key_item_options
            remove:
                description: "Remove home directory when state=absent"
                type: bool
                default: false

_user_defaults_options: &user_defaults_options
    access_user_shell_default:
        description: "Default shell for new users"
        type: str
        default: /bin/bash
    access_user_create_home_default:
        description: "Create home directory by default for new users"
        type: bool
        default: true
    access_user_update_password_default:
        description: "Default password update policy for users"
        type: str
        default: on_create

_group_options: &group_options
    access_groups:
        description: "List of groups to manage"
        type: list
        elements: dict
        default: []
        options:
            name:
                description: "Group name"
                type: str
                required: true
            gid:
                description: "Group ID"
                type: int
            state:
                description: "Group state"
                type: str
                default: present
                choices: [present, absent]
            system:
                description: "System group"
                type: bool
                default: false

_sudoers_options: &sudoers_options
    access_sudoers:
        description: "List of sudoers entries"
        type: list
        elements: dict
        default: []
        options:
            name:
                description: "Entry name (for filename)"
                type: str
                required: true
            user:
                description: "User to grant sudo access"
                type: str
            group:
                description: "Group to grant sudo access"
                type: str
            commands:
                description: "Commands allowed"
                type: str
                default: ALL
            hosts:
                description: "Hosts where rule applies"
                type: str
                default: ALL
            runas:
                description: "Users to run commands as"
                type: str
                default: ALL
            nopasswd:
                description: "Allow without password"
                type: bool
                default: false
            setenv:
                description: "Allow setting environment"
                type: bool
                default: false
            state:
                description: "Sudoers entry state"
                type: str
                default: present
                choices: [present, absent]

_sudoers_file_options: &sudoers_file_options
    access_sudoers_file_owner:
        description: "Owner of sudoers files"
        type: str
        default: root
    access_sudoers_file_group:
        description: "Group of sudoers files"
        type: str
        default: root
    access_sudoers_file_mode:
        description: "File mode for sudoers files"
        type: str
        default: "0440"
    access_sudoers_validate:
        description: "Validate sudoers syntax with visudo"
        type: bool
        default: true

_ssh_server_options: &ssh_server_options
    access_ssh_port:
        description: "SSH port"
        type: int
        default: 22
    access_ssh_listen_addresses:
        description: "List of addresses for SSH to listen on"
        type: list
        elements: str
        default: []
    access_ssh_permit_root_login:
        description: "Permit root login"
        type: str
        default: prohibit-password
        choices: [true, false, prohibit-password, forced-commands-only]
    access_ssh_pubkey_authentication:
        description: "Enable public key authentication"
        type: bool
        default: true
    access_ssh_password_authentication:
        description: "Enable password authentication"
        type: bool
        default: false
    access_ssh_challenge_response_authentication:
        description: "Enable challenge-response authentication"
        type: bool
        default: false
    access_ssh_gssapi_authentication:
        description: "Enable GSSAPI authentication"
        type: bool
        default: false
    access_ssh_kerberos_authentication:
        description: "Enable Kerberos authentication"
        type: bool
        default: false
    access_ssh_permit_empty_passwords:
        description: "Permit empty passwords"
        type: bool
        default: false
    access_ssh_permit_user_environment:
        description: "Allow users to set environment variables"
        type: bool
        default: false
    access_ssh_max_auth_tries:
        description: "Maximum authentication attempts per connection"
        type: int
        default: 3
    access_ssh_max_sessions:
        description: "Maximum number of open sessions per connection"
        type: int
        default: 10
    access_ssh_max_startups:
        description: "Maximum concurrent unauthenticated connections"
        type: str
        default: "10:30:60"
    access_ssh_login_grace_time:
        description: "Time in seconds to authenticate before disconnecting"
        type: int
        default: 60
    access_ssh_x11_forwarding:
        description: "Enable X11 forwarding"
        type: bool
        default: false
    access_ssh_tcp_forwarding:
        description: "Enable TCP forwarding"
        type: bool
        default: true
    access_ssh_agent_forwarding:
        description: "Enable SSH agent forwarding"
        type: bool
        default: false
    access_ssh_gateway_ports:
        description: "Allow remote hosts to connect to forwarded ports"
        type: bool
        default: false
    access_ssh_permit_tunnel:
        description: "Allow tunnel device forwarding"
        type: bool
        default: false
    access_ssh_log_level:
        description: "SSH daemon log level"
        type: str
        default: INFO
    access_ssh_syslog_facility:
        description: "Syslog facility for SSH daemon"
        type: str
        default: AUTH
    access_ssh_client_alive_interval:
        description: "Interval in seconds for client alive messages"
        type: int
        default: 300
    access_ssh_client_alive_count_max:
        description: "Maximum client alive messages without response"
        type: int
        default: 3
    access_ssh_tcp_keep_alive:
        description: "Enable TCP keepalive messages"
        type: bool
        default: true
    access_ssh_compression:
        description: "Enable SSH compression"
        type: bool
        default: false
    access_ssh_allow_users:
        description: "List of users allowed to connect via SSH"
        type: list
        elements: str
        default: []
    access_ssh_allow_groups:
        description: "List of groups allowed to connect via SSH"
        type: list
        elements: str
        default: []
    access_ssh_deny_users:
        description: "List of users denied SSH access"
        type: list
        elements: str
        default: []
    access_ssh_deny_groups:
        description: "List of groups denied SSH access"
        type: list
        elements: str
        default: []
    access_ssh_subsystem_sftp:
        description: "Path to SFTP server binary"
        type: str
        default: /usr/lib/openssh/sftp-server
    access_ssh_config_extra:
        description: "Extra SSH configuration options as key-value pairs"
        type: dict
        default: {}
    access_ssh_service_enabled:
        description: "Enable SSH service"
        type: bool
        default: true
    access_ssh_service_state:
        description: "SSH service state"
        type: str
        default: started
        choices: [started, stopped, restarted, reloaded]
    access_ssh_restart_on_change:
        description: "Restart SSH service when configuration changes"
        type: bool
        default: true

_ssh_keys_options: &ssh_keys_options
    access_ssh_keys:
        description: "List of SSH keys to manage"
        type: list
        elements: dict
        default: []
        options:
            <<: *ssh_key_item_options

_service_options: &service_options
    access_services_to_restart:
        description: "Additional services to restart after access changes"
        type: list
        elements: str
        default: []

_retry_options: &retry_options
    access_retry_count:
        description: "Number of retry attempts for tasks"
        type: int
        default: 3
    access_retry_delay:
        description: "Delay in seconds between retry attempts"
        type: int
        default: 5

_validation_options: &validation_options
    access_validate_sudoers:
        description: "Validate sudoers files before applying"
        type: bool
        default: true
    access_validate_ssh_config:
        description: "Validate SSH config before applying"
        type: bool
        default: true
    access_backup_configs:
        description: "Backup configuration files before changes"
        type: bool
        default: true

_debug_options: &debug_options
    access_debug_mode:
        description: "Enable debug output for troubleshooting"
        type: bool
        default: false

_entry_point_controls: &entry_point_controls
    access_users_enabled:
        description: "Enable user management entry point"
        type: bool
        default: true
    access_groups_enabled:
        description: "Enable group management entry point"
        type: bool
        default: true
    access_sudoers_enabled:
        description: "Enable sudoers management entry point"
        type: bool
        default: true
    access_ssh_server_enabled:
        description: "Enable SSH server configuration entry point"
        type: bool
        default: true
    access_ssh_keys_enabled:
        description: "Enable SSH key management entry point"
        type: bool
        default: true

argument_specs:
    main:
        short_description: "Access management with multi-entry-point support"
        description:
            - "Manages system access including users, groups, sudo and SSH"
            - "Supports granular control via entry points"
            - "Security-focused with validation and backup options"
        options:
            <<:
                [
                    *entry_point_controls,
                    *user_options,
                    *user_defaults_options,
                    *group_options,
                    *sudoers_options,
                    *sudoers_file_options,
                    *ssh_server_options,
                    *ssh_keys_options,
                    *service_options,
                    *retry_options,
                    *validation_options,
                    *debug_options,
                ]

    users:
        short_description: "User management entry point"
        description:
            - "Entry point for managing user accounts"
            - "Handles user creation, modification and removal"
        options:
            <<: [*user_options, *user_defaults_options]

    groups:
        short_description: "Group management entry point"
        description:
            - "Entry point for managing groups"
            - "Handles group creation and removal"
        options:
            <<: *group_options

    sudoers:
        short_description: "Sudoers management entry point"
        description:
            - "Entry point for managing sudoers configuration"
            - "Handles sudo access control"
        options:
            <<: [*sudoers_options, *sudoers_file_options, *validation_options]

    ssh:
        short_description: "SSH server configuration entry point"
        description:
            - "Entry point for SSH server configuration"
            - "Handles sshd_config and service management"
        options:
            <<: [*ssh_server_options, *validation_options]

    ssh_keys:
        short_description: "SSH key management entry point"
        description:
            - "Entry point for managing SSH authorized keys"
            - "Handles SSH key deployment for users"
        options:
            <<: *ssh_keys_options
