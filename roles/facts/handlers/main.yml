---
# Facts role handlers
- name: Refresh facts
  ansible.builtin.setup:
      gather_subset:
          - all
  listen: "Refresh facts"
  tags:
      - facts

- name: "Restart ssh service"
  ansible.builtin.systemd_service:
      name: "{{ _ssh_service_name }}"
      state: restarted
  vars:
      _ssh_service_name: >-
          {{ facts_ssh_service_names[ansible_facts['os_family']] |
             default(facts_ssh_service_names['default']) }}
  when:
      - ansible_facts['service_mgr'] == 'systemd'
  listen: "Restart ssh service"

- name: Update motd
  # `update-motd` refreshes /run/motd.dynamic from /etc/update-motd.d
  # scripts. A handler only fires when something upstream notified it,
  # so reporting the run as changed (the default) matches reality.
  ansible.builtin.command: update-motd
  when: ansible_os_family == "Debian"
  changed_when: true
  listen: "Update motd"
  tags:
      - motd
