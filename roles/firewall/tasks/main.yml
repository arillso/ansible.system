---
- name: Apply hierarchical override and generate final firewall configuration
  ansible.builtin.set_fact:
      _firewall: >-
          {{ {
              'firewall': firewall | default([]),
              'firewall_global': firewall_global | default([]),
              'firewall_group': firewall_group | default([]),
              'firewall_host': firewall_host | default([])
          } | arillso.system.to_nftables_hierarchy }}

- name: Install nftables package
  ansible.builtin.package:
      name: nftables
      state: present
  become: true

- name: Create nftables configuration directory
  ansible.builtin.file:
      path: /etc/nftables
      state: directory
      mode: "0755"
      owner: root
      group: root
  become: true

- name: Generate nftables.conf from hierarchical YAML structure
  ansible.builtin.template:
      src: etc/nftables.conf.j2
      dest: /etc/nftables.conf
      mode: "0644"
      owner: root
      group: root
      backup: true
  become: true
  notify: Restart nftables

- name: Gather service facts to check for tailscaled
  ansible.builtin.service_facts:
  when: ansible_facts.services is not defined

- name: Check if tailscaled service exists
  ansible.builtin.set_fact:
      _firewall_tailscale_exists: >-
          {{ 'tailscaled.service' in ansible_facts.get('services', {}) }}

- name: Deploy nftables systemd override via systemd role
  ansible.builtin.include_role:
      name: arillso.system.systemd
      tasks_from: unit
  vars:
      # Scoped flush statt `nft flush ruleset` — sonst wipet der
      # systemd-Stop (auch ueber Restart-Pfad ausgeloest) alle Tables
      # anderer Quellen mit, inkl. Docker's ip nat / ip filter Chains,
      # was Container-Recreates mit "iptables: No chain/target/match by
      # that name" fail-en laesst. Leading "" resettet die upstream-
      # ExecStop-Zeile (sonst wuerde unsere additiv angehaengt), und
      # das "-"-Prefix laesst systemd den Stop bei nicht existenter
      # Table (Fresh-Boot, Service-Start vor erstem Apply) ignorieren.
      _firewall_execstop_cmds: >-
          {{ [''] + (_firewall | default([])
                     | map(attribute='table.family')
                     | zip(_firewall | default([]) | map(attribute='table.name'))
                     | map('join', ' ')
                     | map('regex_replace', '^', '-/usr/sbin/nft flush table ')
                     | list) }}
      # Unit dict is built from a static base plus the Tailscale
      # ordering deps if and only if the service is present. Keeps
      # the include_role single (Audit M5) and avoids the 50-line
      # copy/paste of the previous two branches.
      _firewall_unit_base:
          Unit:
              Description: nftables firewall with enhanced configuration
              Documentation: https://wiki.nftables.org/
          Service:
              Type: oneshot
              RemainAfterExit: "yes"
              ExecStart:
                  - ""
                  - /usr/sbin/nft -f /etc/nftables.conf
              ExecReload: /usr/sbin/nft -f /etc/nftables.conf
              ExecStop: "{{ _firewall_execstop_cmds }}"
          Install:
              WantedBy: multi-user.target
      _firewall_unit_tailscale_overlay:
          Unit:
              After: ["tailscaled.service"]
              Wants: ["tailscaled.service"]
      _firewall_unit: >-
          {{ _firewall_unit_base | combine(
                 _firewall_tailscale_exists | bool
                 | ternary(_firewall_unit_tailscale_overlay, {}),
                 recursive=true) }}
      systemd_unit_path: /etc/systemd/system/nftables.service.d
      systemd_units:
          - name: override.conf
            state: present
            unit: "{{ _firewall_unit }}"

- name: Enable and start nftables service via systemd role
  ansible.builtin.include_role:
      name: arillso.system.systemd
      tasks_from: service
  vars:
      systemd_services:
          - name: nftables
            enabled: true
            state: started
            daemon_reload: true
