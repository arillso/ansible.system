---
# Normalise `packages_keys` into `_pkg_keys_normalised`: a list of
# dicts, one per input entry, with these fields always set:
#
#   index      0-based position in the original packages_keys list
#   state      'present' (default) or 'absent'
#   dispatch   'url-direct' | 'url-dearmor' | 'keyserver' | 'data'
#              | 'unknown' (entry has no valid combination)
#   label      short tag for loop labels
#   keyring    absolute /usr/share/keyrings/... path
#   armored    /tmp/...-armored.asc staging path (only for dearmor flows)
#
# Keeping the normalisation in one place removes the seven copies of
# the same `default(...)` Jinja expression that the original eight
# tasks needed.

- name: Build normalised key dispatch list
  ansible.builtin.set_fact:
      _pkg_keys_normalised: >-
          {{
            _pkg_keys_normalised | default([]) + [{
              'index':    _pkg_keys_index,
              'state':    _pkg_key_state,
              'dispatch': _pkg_key_dispatch,
              'label':    _pkg_key_label,
              'keyring':  _pkg_key_keyring,
              'armored':  '/tmp/' + _pkg_key_label + '-armored.asc',
            }]
          }}
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_keys_item
      index_var: _pkg_keys_index
      label: >-
          {{ _pkg_keys_item.name
             | default(_pkg_keys_item.id | default('custom'))
          }}
  vars:
      _pkg_key_state: "{{ _pkg_keys_item.state | default('present') }}"
      _pkg_key_dearmor: "{{ _pkg_keys_item.dearmor | default(false) | bool }}"
      _pkg_key_label: >-
          {{ _pkg_keys_item.name
             | default(_pkg_keys_item.id | default('custom'))
          }}
      _pkg_key_keyring: >-
          {{ _pkg_keys_item.keyring
             | default('/usr/share/keyrings/' + _pkg_key_label + '-keyring.gpg')
          }}
      _pkg_key_dispatch: >-
          {{
            (_pkg_keys_item.url is defined and _pkg_key_dearmor)
            | ternary('url-dearmor',
              (_pkg_keys_item.url is defined and not _pkg_key_dearmor)
              | ternary('url-direct',
                (_pkg_keys_item.keyserver is defined and _pkg_keys_item.id is defined)
                | ternary('keyserver',
                  (_pkg_keys_item.data is defined)
                  | ternary('data', 'unknown'))))
          }}
