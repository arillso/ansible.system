---
# Entry point for APT key management
# Modern implementation using keyring files instead of deprecated apt_key

- name: Create keyrings directory
  ansible.builtin.file:
      path: /usr/share/keyrings
      state: directory
      mode: "0755"
      owner: root
      group: root
  become: true

- name: Download APT signing keys (URL with keyring)
  ansible.builtin.get_url:
      url: "{{ _pkg_key_item.url }}"
      dest: >-
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name | default('custom')) +
                     '-keyring.gpg') }}
      mode: "0644"
      owner: root
      group: root
      timeout: 30
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.url is defined
      - _pkg_key_item.keyring is defined
      - _pkg_key_item.state | default('present') == 'present'
      - not (_pkg_key_item.dearmor | default(false))
  register: _packages_keys_added_url_keyring
  become: true

- name: Download APT signing keys for dearmoring (URL with keyring)
  ansible.builtin.get_url:
      url: "{{ _pkg_key_item.url }}"
      dest: "/tmp/{{ _pkg_key_item.name | default('custom') }}-armored.asc"
      mode: "0600"
      timeout: 30
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.url is defined
      - _pkg_key_item.keyring is defined
      - _pkg_key_item.state | default('present') == 'present'
      - _pkg_key_item.dearmor | default(false)
  register: _packages_keys_downloaded_url_keyring_dearmor
  become: true

- name: Dearmor APT signing keys (URL with keyring)
  ansible.builtin.shell:
      cmd: >-
          gpg --dearmor -o
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name | default('custom')) +
                     '-keyring.gpg') | quote }}
          < /tmp/{{ _pkg_key_item.name | default('custom') }}-armored.asc &&
          rm -f /tmp/{{ _pkg_key_item.name | default('custom') }}-armored.asc
      executable: /bin/bash
      creates: >-
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name | default('custom')) +
                     '-keyring.gpg') }}
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.url is defined
      - _pkg_key_item.keyring is defined
      - _pkg_key_item.state | default('present') == 'present'
      - _pkg_key_item.dearmor | default(false)
  register: _packages_keys_added_url_keyring_dearmor
  become: true

- name: Set correct permissions for dearmored keys
  ansible.builtin.file:
      path: >-
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name | default('custom')) +
                     '-keyring.gpg') }}
      mode: "0644"
      owner: root
      group: root
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - _packages_keys_added_url_keyring_dearmor is changed
      - _pkg_key_item.url is defined
      - _pkg_key_item.keyring is defined
      - _pkg_key_item.state | default('present') == 'present'
      - _pkg_key_item.dearmor | default(false)
  become: true

- name: Download APT signing keys (URL without keyring)
  ansible.builtin.get_url:
      url: "{{ _pkg_key_item.url }}"
      dest: "/usr/share/keyrings/{{ _pkg_key_item.name | default('custom') }}-keyring.gpg"
      mode: "0644"
      owner: root
      group: root
      timeout: 30
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.url is defined
      - _pkg_key_item.keyring is not defined
      - _pkg_key_item.state | default('present') == 'present'
      - not (_pkg_key_item.dearmor | default(false))
  register: _packages_keys_added_url
  become: true

- name: Download APT signing keys for dearmoring (URL without keyring)
  ansible.builtin.get_url:
      url: "{{ _pkg_key_item.url }}"
      dest: "/tmp/{{ _pkg_key_item.name | default('custom') }}-armored.asc"
      mode: "0600"
      timeout: 30
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.url is defined
      - _pkg_key_item.keyring is not defined
      - _pkg_key_item.state | default('present') == 'present'
      - _pkg_key_item.dearmor | default(false)
  register: _packages_keys_downloaded_url_dearmor
  become: true

- name: Dearmor APT signing keys (URL without keyring)
  ansible.builtin.shell:
      cmd: >-
          gpg --dearmor -o
          {{ ('/usr/share/keyrings/' + (_pkg_key_item.name | default('custom')) +
              '-keyring.gpg') | quote }}
          < /tmp/{{ _pkg_key_item.name | default('custom') }}-armored.asc &&
          rm -f /tmp/{{ _pkg_key_item.name | default('custom') }}-armored.asc
      executable: /bin/bash
      creates: "/usr/share/keyrings/{{ _pkg_key_item.name | default('custom') }}-keyring.gpg"
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.url is defined
      - _pkg_key_item.keyring is not defined
      - _pkg_key_item.state | default('present') == 'present'
      - _pkg_key_item.dearmor | default(false)
  register: _packages_keys_added_url_dearmor
  become: true

- name: Set correct permissions for dearmored keys (URL without keyring)
  ansible.builtin.file:
      path: "/usr/share/keyrings/{{ _pkg_key_item.name | default('custom') }}-keyring.gpg"
      mode: "0644"
      owner: root
      group: root
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - _packages_keys_added_url_dearmor is changed
      - _pkg_key_item.url is defined
      - _pkg_key_item.keyring is not defined
      - _pkg_key_item.state | default('present') == 'present'
      - _pkg_key_item.dearmor | default(false)
  become: true

- name: Fetch APT signing keys from keyserver
  ansible.builtin.shell:
      cmd: >-
          set -o pipefail &&
          _tmpfile=$(mktemp --suffix=.gpg) &&
          trap 'rm -f "$_tmpfile" "${_tmpfile}~"' EXIT &&
          gpg --no-default-keyring --keyring "$_tmpfile"
          --keyserver {{ _pkg_key_item.keyserver | quote }}
          --recv-keys {{ _pkg_key_item.id | quote }} &&
          gpg --no-default-keyring --keyring "$_tmpfile"
          --export {{ _pkg_key_item.id | quote }} >
          {{ (_pkg_key_item.keyring |
              default('/usr/share/keyrings/' + (_pkg_key_item.name | default(_pkg_key_item.id)) +
                      '-keyring.gpg')) | quote }}
      executable: /bin/bash
      creates: >-
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name | default(_pkg_key_item.id)) +
                     '-keyring.gpg') }}
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.keyserver is defined
      - _pkg_key_item.id is defined
      - _pkg_key_item.state | default('present') == 'present'
  register: _packages_keys_added_keyserver
  become: true

- name: Set correct permissions for keyserver keys
  ansible.builtin.file:
      path: >-
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name | default(_pkg_key_item.id)) +
                     '-keyring.gpg') }}
      mode: "0644"
      owner: root
      group: root
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - _packages_keys_added_keyserver is changed
      - _pkg_key_item.keyserver is defined
      - _pkg_key_item.id is defined
      - _pkg_key_item.state | default('present') == 'present'
  become: true

- name: Write APT signing key data to temp file
  ansible.builtin.copy:
      content: "{{ _pkg_key_item.data }}"
      dest: "/tmp/{{ _pkg_key_item.name | default('custom-data') }}-armored.asc"
      mode: "0600"
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.data is defined
      - _pkg_key_item.state | default('present') == 'present'
  register: _packages_keys_data_written
  become: true

- name: Dearmor APT signing keys from data
  ansible.builtin.shell:
      cmd: >-
          gpg --dearmor -o
          {{ (_pkg_key_item.keyring |
              default('/usr/share/keyrings/' + (_pkg_key_item.name | default('custom-data')) +
                      '-keyring.gpg')) | quote }}
          < /tmp/{{ _pkg_key_item.name | default('custom-data') }}-armored.asc &&
          rm -f /tmp/{{ _pkg_key_item.name | default('custom-data') }}-armored.asc
      executable: /bin/bash
      creates: >-
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name | default('custom-data')) +
                     '-keyring.gpg') }}
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.data is defined
      - _pkg_key_item.state | default('present') == 'present'
  register: _packages_keys_added_data
  become: true

- name: Set correct permissions for data-imported keys
  ansible.builtin.file:
      path: >-
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name | default('custom-data')) +
                     '-keyring.gpg') }}
      mode: "0644"
      owner: root
      group: root
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - _packages_keys_added_data is changed
      - _pkg_key_item.data is defined
      - _pkg_key_item.state | default('present') == 'present'
  become: true

- name: Remove APT signing keys (absent state)
  ansible.builtin.file:
      path: >-
          {{ _pkg_key_item.keyring |
             default('/usr/share/keyrings/' + (_pkg_key_item.name |
                     default(_pkg_key_item.id | default('custom'))) +
                     '-keyring.gpg') }}
      state: absent
  loop: "{{ packages_keys }}"
  loop_control:
      loop_var: _pkg_key_item
  when:
      - packages_keys | length > 0
      - _pkg_key_item.state | default('present') == 'absent'
  register: _packages_keys_removed
  become: true

- name: Set keys change flag
  ansible.builtin.set_fact:
      packages_keys_changed: true
  when: >
      (_packages_keys_added_url_keyring is defined and _packages_keys_added_url_keyring is changed) or
      (_packages_keys_added_url_keyring_dearmor is defined and _packages_keys_added_url_keyring_dearmor is changed) or
      (_packages_keys_added_url is defined and _packages_keys_added_url is changed) or
      (_packages_keys_added_url_dearmor is defined and _packages_keys_added_url_dearmor is changed) or
      (_packages_keys_added_keyserver is defined and _packages_keys_added_keyserver is changed) or
      (_packages_keys_added_data is defined and _packages_keys_added_data is changed) or
      (_packages_keys_removed is defined and _packages_keys_removed is changed)
