---
# Entry point for APT key management
# Modern implementation using keyring files instead of deprecated apt_key.
#
# The previous layout had eight near-identical task definitions, one
# per (source-type, keyring-defined) combination, and Audit M4 flagged
# the matching bug surface every time something changed (e.g. the
# 1.1.4 dearmor regression had to be fixed in four places). Now each
# entry in `packages_keys` is dispatched through `_key_apply.yml` once
# with normalised metadata pre-computed in `_pkg_keys_normalised`.

- name: Normalise packages_keys for dispatch
  ansible.builtin.include_tasks: _keys_normalise.yml

- name: Create keyrings directory
  ansible.builtin.file:
      path: /usr/share/keyrings
      state: directory
      mode: "0755"
      owner: root
      group: root
  become: true

# Note: This task removes keyring files before re-downloading, which naturally
# bypasses the `creates:` guard on the dearmor and keyserver steps below.
- name: Remove existing keyrings for force update
  ansible.builtin.file:
      path: "{{ _pkg_norm.keyring }}"
      state: absent
  loop: "{{ _pkg_keys_present }}"
  loop_control:
      loop_var: _pkg_norm
      label: "{{ _pkg_norm.label }}"
  when: packages_keys_force_update
  become: true
  vars:
      _pkg_keys_present: >-
          {{ _pkg_keys_normalised | selectattr('state', 'equalto', 'present') | list }}

- name: Apply each APT signing key from packages_keys
  ansible.builtin.include_tasks: _key_apply.yml
  loop: "{{ _pkg_keys_normalised }}"
  loop_control:
      loop_var: _pkg_key
      label: "{{ _pkg_key.label }}"
  when:
      - _pkg_key.state == 'present'
      - _pkg_key.dispatch != 'unknown'
  vars:
      _pkg_key_item: "{{ packages_keys[_pkg_key.index] }}"

- name: Remove APT signing keys (absent state)
  ansible.builtin.file:
      path: "{{ _pkg_norm.keyring }}"
      state: absent
  loop: "{{ _pkg_keys_normalised }}"
  loop_control:
      loop_var: _pkg_norm
      label: "{{ _pkg_norm.label }}"
  when: _pkg_norm.state == 'absent'
  register: _packages_keys_removed
  become: true

- name: Track keyring removals in packages_keys_changed
  ansible.builtin.set_fact:
      packages_keys_changed: true
  when: _packages_keys_removed is changed
