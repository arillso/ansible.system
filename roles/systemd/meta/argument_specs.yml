---
# ── Shared option anchors ──────────────────────────────────────────────

# Dict-key options for systemd_services list items
_systemd_service_item_options: &systemd_service_item_options
    name:
        description: "Service name"
        type: str
        required: true
    state:
        description: "Service state"
        type: str
        choices: [started, stopped, restarted, reloaded]
    enabled:
        description: "Enable service on boot"
        type: bool
    masked:
        description: "Mask service"
        type: bool
    daemon_reload:
        description: "Reload systemd daemon"
        type: bool

# Dict-key options for systemd_units list items
_systemd_unit_item_options: &systemd_unit_item_options
    name:
        description: "Unit file name"
        type: str
        required: true
    state:
        description: "Unit state"
        type: str
        default: present
        choices: [present, absent]
    content:
        description: "Unit file content (raw text)"
        type: str
    unit:
        description: "Unit file content (structured dict)"
        type: dict

# Unit file path and ownership settings
_systemd_unit_path_options: &systemd_unit_path_options
    systemd_unit_path:
        description: "Path for systemd unit files"
        type: str
        default: /etc/systemd/system
    systemd_unit_owner:
        description: "Owner of systemd unit files"
        type: str
        default: root
    systemd_unit_group:
        description: "Group of systemd unit files"
        type: str
        default: root
    systemd_unit_mode:
        description: "File mode for systemd unit files"
        type: str
        default: "0644"

# Validation and safety settings
_systemd_validation_options: &systemd_validation_options
    systemd_validate_units:
        description: "Validate unit files before deploying"
        type: bool
        default: true
    systemd_backup_units:
        description: "Create backups before modifying unit files"
        type: bool
        default: true

# Journald configuration options
_systemd_journald_options: &systemd_journald_options
    systemd_journald_storage:
        description: "Journal storage mode"
        type: str
        default: auto
        choices: [auto, volatile, persistent, none]
    systemd_journald_compress:
        description: "Compress journal data"
        type: bool
        default: true
    systemd_journald_seal:
        description: "Enable Forward Secure Sealing for journal"
        type: bool
        default: true
    systemd_journald_max_retention_sec:
        description: "Maximum retention time for journal entries"
        type: str
        default: 1month
    systemd_journald_max_file_sec:
        description: "Maximum time to store entries in a single journal file"
        type: str
        default: 1month
    systemd_journald_system_max_use:
        description: "Maximum disk space for system journal"
        type: str
        default: 1G
    systemd_journald_system_keep_free:
        description: "Minimum free disk space for system journal"
        type: str
        default: 500M
    systemd_journald_system_max_file_size:
        description: "Maximum size of individual system journal files"
        type: str
        default: 10M
    systemd_journald_system_max_files:
        description: "Maximum number of system journal files"
        type: int
        default: 100
    systemd_journald_runtime_max_use:
        description: "Maximum disk space for runtime journal"
        type: str
        default: ""
    systemd_journald_runtime_keep_free:
        description: "Minimum free disk space for runtime journal"
        type: str
        default: ""
    systemd_journald_runtime_max_file_size:
        description: "Maximum size of individual runtime journal files"
        type: str
        default: ""
    systemd_journald_runtime_max_files:
        description: "Maximum number of runtime journal files"
        type: int
        default: 100
    systemd_journald_rate_limit_interval:
        description: "Rate limiting interval for journal messages"
        type: str
        default: 30s
    systemd_journald_rate_limit_burst:
        description: "Maximum burst of messages within rate limit interval"
        type: int
        default: 1000
    systemd_journald_forward_to_syslog:
        description: "Forward journal to syslog"
        type: bool
        default: true
    systemd_journald_forward_to_kmsg:
        description: "Forward journal to kernel log buffer"
        type: bool
        default: false
    systemd_journald_forward_to_console:
        description: "Forward journal to console"
        type: bool
        default: false
    systemd_journald_forward_to_wall:
        description: "Forward journal to wall messages"
        type: bool
        default: true
    systemd_journald_max_level_store:
        description: "Maximum log level to store in journal"
        type: str
        default: info
    systemd_journald_max_level_syslog:
        description: "Maximum log level to forward to syslog"
        type: str
        default: info
    systemd_journald_max_level_kmsg:
        description: "Maximum log level to forward to kernel log"
        type: str
        default: notice
    systemd_journald_max_level_console:
        description: "Maximum log level to forward to console"
        type: str
        default: warning
    systemd_journald_max_level_wall:
        description: "Maximum log level to forward to wall"
        type: str
        default: emerg
    systemd_journald_line_max:
        description: "Maximum line length for journal entries"
        type: str
        default: 48K
    systemd_journald_sync_interval_sec:
        description: "Interval for syncing journal to disk"
        type: str
        default: 5m
    systemd_journald_split_mode:
        description: "Journal split mode"
        type: str
        default: uid
    systemd_journald_service_state:
        description: "State of the journald service"
        type: str
        default: started
    systemd_journald_service_enabled:
        description: "Enable journald service on boot"
        type: bool
        default: true
    systemd_journald_restart_on_change:
        description: "Restart journald when configuration changes"
        type: bool
        default: true

# ── Argument specs ─────────────────────────────────────────────────────

argument_specs:
    main:
        short_description: "Systemd management with multi-entry-point support"
        description:
            - "Manages systemd services, unit files and journald configuration"
            - "Supports granular control via entry points"
        options:
            # Entry Point Controls
            systemd_service_enabled:
                description: "Enable service management entry point"
                type: bool
                default: true
            systemd_unit_enabled:
                description: "Enable unit file management entry point"
                type: bool
                default: true
            systemd_journald_enabled:
                description: "Enable journald configuration entry point"
                type: bool
                default: true

            # Service Management
            systemd_services:
                description: "List of systemd services to manage"
                type: list
                elements: dict
                default: []
                options:
                    <<: *systemd_service_item_options

            # Unit File Management
            systemd_units:
                description: "List of systemd unit files to manage"
                type: list
                elements: dict
                default: []
                options:
                    <<: *systemd_unit_item_options
            <<:
                [
                    *systemd_unit_path_options,
                    *systemd_journald_options,
                    *systemd_validation_options,
                ]

            # Systemd Daemon Configuration
            systemd_daemon_reload:
                description: "Reload systemd daemon after unit file changes"
                type: bool
                default: false

            # Retry Configuration
            systemd_retry_count:
                description: "Number of retry attempts for tasks"
                type: int
                default: 3
            systemd_retry_delay:
                description: "Delay in seconds between retry attempts"
                type: int
                default: 5

            # Debug Configuration
            systemd_debug_mode:
                description: "Enable debug output for troubleshooting"
                type: bool
                default: false

    service:
        short_description: "Service management entry point"
        description:
            - "Entry point for managing systemd services"
            - "Control service state and boot configuration"
        options:
            systemd_services:
                description: "List of services to manage"
                type: list
                elements: dict
                required: true
                options:
                    <<: *systemd_service_item_options

    unit:
        short_description: "Unit file management entry point"
        description:
            - "Entry point for managing systemd unit files"
            - "Deploy and remove unit files"
        options:
            systemd_units:
                description: "List of unit files to manage"
                type: list
                elements: dict
                required: true
                options:
                    <<: *systemd_unit_item_options
            <<: [*systemd_unit_path_options, *systemd_validation_options]

    journald:
        short_description: "Journald configuration entry point"
        description:
            - "Entry point for configuring systemd-journald"
            - "Manage journal storage, retention and forwarding"
        options:
            <<: *systemd_journald_options
