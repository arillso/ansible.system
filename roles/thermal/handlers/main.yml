---
# Handlers for thermal management role

- name: Restart thermald to apply thermal management configuration
  ansible.builtin.systemd:
      name: thermald
      state: restarted
  become: true
  listen: "thermal: restart thermald"

- name: Restart cpufrequtils to apply thermal-driven CPU governor changes
  ansible.builtin.systemd:
      name: cpufrequtils
      state: restarted
  become: true
  listen: "thermal: restart cpufrequtils"
