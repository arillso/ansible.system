---
# Argument specifications for System Tuning role
# Defines and validates all input parameters for the role

argument_specs:
    main:
        short_description: "Apply system performance tuning configurations"
        description: |
            This role configures system-level performance tuning including
            sysctl parameters, network tuning, I/O schedulers, CPU governors,
            and security limits for optimized server performance.
        options:
            tuning_sysctl_config:
                type: "dict"
                required: false
                description: "Dictionary of sysctl parameters for performance tuning"
                options:
                    vm.dirty_ratio:
                        type: "int"
                        default: 10
                        description: "Percentage of system memory for dirty pages"
                    vm.dirty_background_ratio:
                        type: "int"
                        default: 3
                        description: "Percentage of system memory for background writeback"
                    vm.dirty_expire_centisecs:
                        type: "int"
                        default: 12000
                        description: "Age in centiseconds before dirty data is written"
                    vm.dirty_writeback_centisecs:
                        type: "int"
                        default: 500
                        description: "Interval in centiseconds between writeback passes"
                    vm.swappiness:
                        type: "int"
                        default: 10
                        description: "Tendency to swap out memory pages (0-100)"
                    vm.vfs_cache_pressure:
                        type: "int"
                        default: 50
                        description: "Tendency to reclaim inode/dentry cache"
                    vm.min_free_kbytes:
                        type: "int"
                        default: 131072
                        description: "Minimum free memory in KB"
                    net.core.rmem_default:
                        type: "int"
                        default: 262144
                        description: "Default receive socket buffer size"
                    net.core.rmem_max:
                        type: "int"
                        default: 33554432
                        description: "Maximum receive socket buffer size"
                    net.core.wmem_default:
                        type: "int"
                        default: 262144
                        description: "Default send socket buffer size"
                    net.core.wmem_max:
                        type: "int"
                        default: 33554432
                        description: "Maximum send socket buffer size"
                    net.core.netdev_max_backlog:
                        type: "int"
                        default: 10000
                        description: "Maximum network device backlog"
                    net.core.somaxconn:
                        type: "int"
                        default: 32768
                        description: "Maximum socket connection backlog"
                    net.ipv4.tcp_rmem:
                        type: "str"
                        default: "4096 131072 33554432"
                        description: "TCP receive buffer sizes (min default max)"
                    net.ipv4.tcp_wmem:
                        type: "str"
                        default: "4096 131072 33554432"
                        description: "TCP send buffer sizes (min default max)"
                    net.ipv4.tcp_congestion_control:
                        type: "str"
                        default: "bbr"
                        description: "TCP congestion control algorithm"
                    net.ipv4.tcp_slow_start_after_idle:
                        type: "int"
                        default: 0
                        description: "Disable slow start after idle"
                    net.ipv4.tcp_tw_reuse:
                        type: "int"
                        default: 1
                        description: "Allow reuse of TIME_WAIT sockets"
                    fs.file-max:
                        type: "int"
                        default: 6815744
                        description: "Maximum number of file handles"
                    fs.nr_open:
                        type: "int"
                        default: 1048576
                        description: "Maximum number of open files per process"
                    kernel.pid_max:
                        type: "int"
                        default: 4194304
                        description: "Maximum PID value"
                    kernel.threads-max:
                        type: "int"
                        default: 4194304
                        description: "Maximum number of threads"

            tuning_network_sysctl_config:
                type: "dict"
                required: false
                description: "Additional network-specific sysctl parameters"
                options:
                    net.ipv4.tcp_window_scaling:
                        type: "int"
                        default: 1
                        description: "Enable TCP window scaling"
                    net.ipv4.tcp_timestamps:
                        type: "int"
                        default: 1
                        description: "Enable TCP timestamps"
                    net.ipv4.tcp_sack:
                        type: "int"
                        default: 1
                        description: "Enable TCP selective acknowledgments"
                    net.ipv4.tcp_fack:
                        type: "int"
                        default: 1
                        description: "Enable TCP forward acknowledgment"
                    net.ipv4.tcp_moderate_rcvbuf:
                        type: "int"
                        default: 1
                        description: "Enable automatic receive buffer tuning"
                    net.ipv4.tcp_no_metrics_save:
                        type: "int"
                        default: 1
                        description: "Disable caching of TCP metrics on close"
                    net.ipv4.ip_local_port_range:
                        type: "str"
                        default: "1024 65535"
                        description: "Local port range for outgoing connections"

            tuning_grub_cmdline_linux_append:
                type: "str"
                required: false
                default: "transparent_hugepage=never"
                description: "Kernel parameters to append to GRUB configuration"

            tuning_swap_swappiness:
                type: "int"
                required: false
                default: 10
                description: "Swappiness value (0-100, lower = less swap usage)"

            tuning_swap_file_enabled:
                type: "bool"
                required: false
                default: false
                description: "Enable swap file creation"

            tuning_swap_file_path:
                type: "str"
                required: false
                default: "/swapfile"
                description: "Path to swap file"

            tuning_swap_file_size_mb:
                type: "int"
                required: false
                default: 2048
                description: "Swap file size in megabytes"

            tuning_io_scheduler:
                type: "str"
                required: false
                default: "auto"
                description: |
                    I/O scheduler to use. Set to 'auto' for automatic
                    detection based on storage type.

            tuning_io_scheduler_override:
                type: "str"
                required: false
                default: null
                description: "Override automatic I/O scheduler detection"

            tuning_io_scheduler_devices:
                type: "list"
                required: false
                default: []
                elements: "str"
                description: "List of specific block devices to apply I/O scheduler settings to"

            tuning_cpu_governor:
                type: "str"
                required: false
                default: "auto"
                description: |
                    CPU governor to use. Set to 'auto' for automatic
                    detection based on CPU type.

            tuning_cpu_governor_override:
                type: "str"
                required: false
                default: null
                description: "Override automatic CPU governor detection"

            tuning_transparent_hugepages:
                type: "str"
                required: false
                default: "madvise"
                choices: ["always", "madvise", "never"]
                description: "Transparent Huge Pages configuration"

            tuning_tuned_profile:
                type: "str"
                required: false
                default: "balanced"
                description: "Tuned profile to apply"

            tuning_security_limits:
                type: "list"
                required: false
                elements: "dict"
                description: "List of security limit configurations"
                options:
                    domain:
                        type: "str"
                        required: true
                        description: "User or group domain (e.g., '*', '@group', 'user')"
                    type:
                        type: "str"
                        required: true
                        choices: ["soft", "hard"]
                        description: "Limit type (soft or hard)"
                    item:
                        type: "str"
                        required: true
                        description: "Resource item (e.g., nofile, nproc, memlock)"
                    value:
                        type: "int"
                        required: true
                        description: "Limit value"

            tuning_network_ring_buffers:
                type: "list"
                required: false
                default: []
                elements: "dict"
                description: "List of network interface ring buffer configurations"
                options:
                    interface:
                        type: "str"
                        required: true
                        description: "Network interface name (e.g., eth0, ens3)"
                    rx_buffer:
                        type: "int"
                        required: true
                        description: "Receive ring buffer size"
                    tx_buffer:
                        type: "int"
                        required: true
                        description: "Transmit ring buffer size"

            tuning_packages_list:
                type: "list"
                required: false
                elements: "str"
                default: []
                description: "List of packages required for tuning (auto-detected based on OS family)"

            tuning_network_tuning_enabled:
                type: "bool"
                required: false
                default: true
                description: "Enable network-specific tuning"

            tuning_validate_settings:
                type: "bool"
                required: false
                default: true
                description: "Validate settings before applying"

            tuning_sysctl_file:
                type: "str"
                required: false
                default: "/etc/sysctl.d/99-tuning.conf"
                description: "Path to sysctl configuration file"

            tuning_network_sysctl_file:
                type: "str"
                required: false
                default: "/etc/sysctl.d/99-network-tuning.conf"
                description: "Path to network sysctl configuration file"
